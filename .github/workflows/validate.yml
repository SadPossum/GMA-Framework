name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Bootstrap source roots
        shell: pwsh
        run: ./eng/bootstrap-source-roots.ps1 -Force

      - name: Restore
        run: dotnet restore Gma.Framework.slnx

      - name: Build
        run: dotnet build Gma.Framework.slnx --no-restore -m:1

      - name: Test
        run: dotnet test Gma.Framework.slnx --no-build --logger "console;verbosity=minimal"
